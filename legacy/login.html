<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Kindred Care</title>
  <meta name="description" content="Sign in to your Kindred Care account to manage your pet's bookings, orders and grooming appointments." />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Site CSS -->
  <link href="css/style.css" rel="stylesheet" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px; /* match navbar height */
    }

    /* ── Auth Layout ── */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Soft background blobs matching site palette */
    .auth-wrapper::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,232,206,.5), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
    }
    .auth-wrapper::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -80px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(255,220,192,.4), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
    }

    /* ── Card ── */
    .auth-card {
      background: var(--surface-container-lowest);
      border: 1px solid rgba(0,102,110,.08);
      border-radius: 1.75rem;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      box-shadow: 0 12px 48px rgba(28,28,26,.07);
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      text-decoration: none;
    }
    .auth-brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 22px;
      box-shadow: 0 6px 20px rgba(0,102,110,.25);
    }
    .auth-brand-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .auth-brand-sub {
      font-size: 0.72rem;
      color: var(--on-surface-variant);
      display: block;
      font-weight: 500;
    }

    h1.auth-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--on-surface);
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--on-surface-variant);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* ── Form ── */
    .form-label {
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--on-surface-variant);
      margin-bottom: 7px;
    }
    .input-group-custom {
      position: relative;
      margin-bottom: 20px;
    }
    .input-leading-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--on-surface-variant);
      opacity: .6;
      pointer-events: none;
      z-index: 2;
    }
    .form-control-custom {
      width: 100%;
      background: var(--surface-container-low);
      border: 1.5px solid rgba(28,28,26,.1);
      border-radius: 12px;
      padding: 13px 44px 13px 44px;
      color: var(--on-surface);
      font-size: 0.95rem;
      font-family: 'Manrope', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control-custom:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,110,.1);
      background: #fff;
    }
    .form-control-custom::placeholder { color: rgba(107,107,103,.5); }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--on-surface-variant);
      cursor: pointer;
      padding: 4px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      transition: background .2s;
    }
    .eye-btn:hover { background: var(--surface-container-low); }
    .eye-btn .material-symbols-outlined { font-size: 20px; }

    /* ── Submit ── */
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(0,102,110,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-auth:hover:not(:disabled) {
      background: var(--primary-container);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,102,110,.28);
    }
    .btn-auth:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    .spinner-sm {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert ── */
    .auth-alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
      gap: 8px;
      align-items: center;
      font-weight: 500;
    }
    .auth-alert.error {
      background: #fff0f0;
      border: 1px solid rgba(186,26,26,.2);
      color: var(--danger);
    }
    .auth-alert.success {
      background: var(--secondary-container);
      border: 1px solid rgba(73,101,81,.25);
      color: var(--on-secondary-container);
    }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      color: var(--on-surface-variant);
      font-size: 0.8rem;
      font-weight: 500;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(28,28,26,.08);
    }

    /* ── Footer links ── */
    .auth-footer {
      text-align: center;
      font-size: 0.875rem;
      color: var(--on-surface-variant);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; text-underline-offset: 3px; }

    .back-to-site {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 18px;
      font-size: 0.82rem;
      color: var(--on-surface-variant);
      text-decoration: none;
      transition: color .2s;
    }
    .back-to-site:hover { color: var(--primary); }
    .back-to-site .material-symbols-outlined { font-size: 16px; }

    @media (max-width: 520px) {
      .auth-card { padding: 36px 24px; border-radius: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar (matches site) -->
  <nav class="navbar navbar-expand-md fixed-top custom-nav shadow-sm">
    <div class="container-fluid max-w-custom">
      <a class="navbar-brand brand-text" href="/">Kindred Care</a>
      <div class="collapse navbar-collapse justify-content-center flex-grow-1">
        <ul class="navbar-nav gap-3">
          <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/store.html">Store</a></li>
          <li class="nav-item"><a class="nav-link" href="/booking.html">Booking</a></li>
        </ul>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="/register.html" class="btn btn-sm btn-secondary-light fw-bold rounded-pill px-3 py-2" style="font-family:'Plus Jakarta Sans',sans-serif">Create Account</a>
      </div>
    </div>
  </nav>

  <!-- Auth Content -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <a href="/" class="auth-brand">
        <div class="auth-brand-icon">🐾</div>
        <div>
          <span class="auth-brand-name">Kindred Care</span>
          <span class="auth-brand-sub">Your trusted pet companion</span>
        </div>
      </a>

      <!-- Heading -->
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage your pet's care & orders</p>

      <!-- Alert -->
      <div class="auth-alert" id="alertBox">
        <span class="material-symbols-outlined" style="font-size:18px" id="alertIcon">info</span>
        <span id="alertMsg"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div>
          <label class="form-label">Email address</label>
          <div class="input-group-custom">
            <span class="input-leading-icon material-symbols-outlined">mail</span>
            <input type="email" id="email" class="form-control-custom"
                   placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="form-label">Password</label>
          <div class="input-group-custom" style="margin-bottom:0">
            <span class="input-leading-icon material-symbols-outlined">lock</span>
            <input type="password" id="password" class="form-control-custom"
                   placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePwd()">
              <span class="material-symbols-outlined" id="eyeIcon">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth mt-4" id="submitBtn">
          <div class="spinner-sm" id="spinner"></div>
          <span id="btnText">Sign In</span>
          <span class="material-symbols-outlined" id="btnArrow" style="font-size:18px">arrow_forward</span>
        </button>

      </form>

      <div class="auth-divider">or</div>

      <p class="auth-footer">
        New to Kindred Care? <a href="/register.html">Create a free account →</a>
      </p>
      <a href="/" class="back-to-site">
        <span class="material-symbols-outlined">arrow_back</span> Back to Kindred Care
      </a>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Already logged in?
    if (localStorage.getItem('petcare_token')) window.location.href = '/';

    let pwdVisible = false;
    function togglePwd() {
      pwdVisible = !pwdVisible;
      document.getElementById('password').type = pwdVisible ? 'text' : 'password';
      document.getElementById('eyeIcon').textContent = pwdVisible ? 'visibility_off' : 'visibility';
    }

    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.className = 'auth-alert ' + type;
      document.getElementById('alertMsg').textContent = msg;
      document.getElementById('alertIcon').textContent = type === 'error' ? 'error' : 'check_circle';
      box.style.display = 'flex';
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      document.getElementById('spinner').style.display  = loading ? 'block' : 'none';
      document.getElementById('btnArrow').style.display = loading ? 'none'  : 'block';
      document.getElementById('btnText').textContent    = loading ? 'Signing in…' : 'Sign In';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAlert('Please fill in all fields.'); return; }

      setLoading(true);
      document.getElementById('alertBox').style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('petcare_token', data.token);
          localStorage.setItem('petcare_user',  JSON.stringify(data.user));
          showAlert('Login successful! Redirecting…', 'success');
          setTimeout(() => window.location.href = '/', 800);
        } else {
          showAlert(data.message || 'Login failed.');
          setLoading(false);
        }
      } catch {
        showAlert('Cannot reach server. Please make sure it is running.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
