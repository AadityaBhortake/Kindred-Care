<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Kindred Care</title>
  <meta name="description" content="Create your Kindred Care account to book vet appointments, buy pet products and schedule grooming sessions." />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Site CSS -->
  <link href="css/style.css" rel="stylesheet" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      position: relative;
      overflow: hidden;
    }
    .auth-wrapper::before {
      content: '';
      position: fixed;
      top: -80px; left: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,232,206,.5), transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none; z-index: 0;
    }
    .auth-wrapper::after {
      content: '';
      position: fixed;
      bottom: -80px; right: -80px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(255,220,192,.45), transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none; z-index: 0;
    }

    .auth-card {
      background: var(--surface-container-lowest);
      border: 1px solid rgba(0,102,110,.08);
      border-radius: 1.75rem;
      padding: 48px 44px;
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
      box-shadow: 0 12px 48px rgba(28,28,26,.07);
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px; text-decoration: none;
    }
    .auth-brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 6px 20px rgba(0,102,110,.25);
    }
    .auth-brand-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem; font-weight: 700; color: var(--primary);
    }
    .auth-brand-sub {
      font-size: 0.72rem; color: var(--on-surface-variant);
      display: block; font-weight: 500;
    }

    h1.auth-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.75rem; font-weight: 800;
      color: var(--on-surface); margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--on-surface-variant); font-size: 0.9rem; margin-bottom: 32px;
    }

    .form-label {
      font-weight: 600; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--on-surface-variant); margin-bottom: 7px; display: block;
    }
    .input-group-custom { position: relative; margin-bottom: 18px; }
    .input-leading-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 20px; color: var(--on-surface-variant); opacity: .6;
      pointer-events: none; z-index: 2;
    }
    .form-control-custom {
      width: 100%;
      background: var(--surface-container-low);
      border: 1.5px solid rgba(28,28,26,.1);
      border-radius: 12px;
      padding: 13px 44px 13px 44px;
      color: var(--on-surface);
      font-size: 0.93rem;
      font-family: 'Manrope', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control-custom:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,110,.1);
      background: #fff;
    }
    .form-control-custom::placeholder { color: rgba(107,107,103,.5); }
    .form-control-custom.is-invalid { border-color: var(--danger); }

    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--on-surface-variant);
      cursor: pointer; padding: 4px; display: grid; place-items: center;
      border-radius: 6px; transition: background .2s;
    }
    .eye-btn:hover { background: var(--surface-container-low); }
    .eye-btn .material-symbols-outlined { font-size: 20px; }

    /* Two-column row */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Password strength */
    .strength-track {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-track span {
      flex: 1; height: 3px; border-radius: 3px;
      background: rgba(28,28,26,.1);
      transition: background .3s;
    }
    .strength-track span.weak   { background: var(--danger); }
    .strength-track span.fair   { background: var(--tertiary-container); }
    .strength-track span.strong { background: var(--primary); }
    .strength-label { font-size: 0.74rem; margin-top: 4px; font-weight: 600; }

    /* Terms */
    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin: 6px 0 22px;
    }
    .terms-row input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px; height: 16px; min-width: 16px;
      margin-top: 3px; cursor: pointer;
    }
    .terms-row label {
      font-size: 0.83rem; color: var(--on-surface-variant);
      cursor: pointer; text-transform: none; letter-spacing: 0;
      font-weight: 400;
    }
    .terms-row a { color: var(--primary); font-weight: 600; text-decoration: none; }

    .btn-auth {
      width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(0,102,110,.2);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-auth:hover:not(:disabled) {
      background: var(--primary-container);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,102,110,.28);
    }
    .btn-auth:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    .spinner-sm {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 0.875rem; margin-bottom: 20px;
      display: none; gap: 8px; align-items: center; font-weight: 500;
    }
    .auth-alert.error {
      background: #fff0f0;
      border: 1px solid rgba(186,26,26,.2);
      color: var(--danger);
    }
    .auth-alert.success {
      background: var(--secondary-container);
      border: 1px solid rgba(73,101,81,.25);
      color: var(--on-secondary-container);
    }

    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 18px;
      color: var(--on-surface-variant); font-size: 0.8rem; font-weight: 500;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(28,28,26,.08);
    }

    .auth-footer { text-align: center; font-size: 0.875rem; color: var(--on-surface-variant); }
    .auth-footer a { color: var(--primary); font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; text-underline-offset: 3px; }

    .back-to-site {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      margin-top: 18px; font-size: 0.82rem; color: var(--on-surface-variant);
      text-decoration: none; transition: color .2s;
    }
    .back-to-site:hover { color: var(--primary); }
    .back-to-site .material-symbols-outlined { font-size: 16px; }

    @media (max-width: 520px) {
      .auth-card { padding: 36px 20px; border-radius: 1.25rem; }
      .form-row  { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md fixed-top custom-nav shadow-sm">
    <div class="container-fluid max-w-custom">
      <a class="navbar-brand brand-text" href="/">Kindred Care</a>
      <div class="collapse navbar-collapse justify-content-center flex-grow-1">
        <ul class="navbar-nav gap-3">
          <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/store.html">Store</a></li>
          <li class="nav-item"><a class="nav-link" href="/booking.html">Booking</a></li>
        </ul>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="/login.html" class="text-primary-custom fw-bold text-decoration-none" style="font-size:.9rem">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- Auth Content -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <a href="/" class="auth-brand">
        <div class="auth-brand-icon">🐾</div>
        <div>
          <span class="auth-brand-name">Kindred Care</span>
          <span class="auth-brand-sub">Your trusted pet companion</span>
        </div>
      </a>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join thousands of happy pet owners today</p>

      <!-- Alert -->
      <div class="auth-alert" id="alertBox">
        <span class="material-symbols-outlined" style="font-size:18px" id="alertIcon">info</span>
        <span id="alertMsg"></span>
      </div>

      <!-- Form -->
      <form id="registerForm" novalidate>

        <!-- Name Row -->
        <div class="form-row">
          <div>
            <label class="form-label">First Name</label>
            <div class="input-group-custom">
              <span class="input-leading-icon material-symbols-outlined">person</span>
              <input type="text" id="firstName" class="form-control-custom" placeholder="Rahul" required />
            </div>
          </div>
          <div>
            <label class="form-label">Last Name</label>
            <div class="input-group-custom">
              <span class="input-leading-icon material-symbols-outlined">person</span>
              <input type="text" id="lastName" class="form-control-custom" placeholder="Sharma" />
            </div>
          </div>
        </div>

        <!-- Email -->
        <label class="form-label">Email Address</label>
        <div class="input-group-custom">
          <span class="input-leading-icon material-symbols-outlined">mail</span>
          <input type="email" id="email" class="form-control-custom" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <!-- Password -->
        <label class="form-label">Password</label>
        <div class="input-group-custom">
          <span class="input-leading-icon material-symbols-outlined">lock</span>
          <input type="password" id="password" class="form-control-custom"
                 placeholder="Min. 6 characters" autocomplete="new-password"
                 required oninput="checkStrength(this.value)" />
          <button type="button" class="eye-btn" onclick="togglePwd('password','eye1')">
            <span class="material-symbols-outlined" id="eye1">visibility</span>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="strength-track" id="strengthBar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
        <div class="strength-label" id="strengthLabel" style="color:var(--on-surface-variant)"></div>

        <!-- Confirm password -->
        <label class="form-label mt-3">Confirm Password</label>
        <div class="input-group-custom" style="margin-bottom:0">
          <span class="input-leading-icon material-symbols-outlined">lock</span>
          <input type="password" id="confirmPassword" class="form-control-custom"
                 placeholder="Repeat your password" autocomplete="new-password" required />
          <button type="button" class="eye-btn" onclick="togglePwd('confirmPassword','eye2')">
            <span class="material-symbols-outlined" id="eye2">visibility</span>
          </button>
        </div>

        <!-- Terms -->
        <div class="terms-row mt-3">
          <input type="checkbox" id="terms" />
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          <div class="spinner-sm" id="spinner"></div>
          <span id="btnText">Create Account</span>
          <span class="material-symbols-outlined" id="btnArrow" style="font-size:18px">arrow_forward</span>
        </button>

      </form>

      <div class="auth-divider">or</div>

      <p class="auth-footer">
        Already have an account? <a href="/login.html">Sign in →</a>
      </p>
      <a href="/" class="back-to-site">
        <span class="material-symbols-outlined">arrow_back</span> Back to Kindred Care
      </a>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (localStorage.getItem('petcare_token')) window.location.href = '/';

    function togglePwd(id, iconId) {
      const f = document.getElementById(id);
      const visible = f.type === 'text';
      f.type = visible ? 'password' : 'text';
      document.getElementById(iconId).textContent = visible ? 'visibility' : 'visibility_off';
    }

    function checkStrength(pwd) {
      const bars  = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
      const label = document.getElementById('strengthLabel');
      bars.forEach(b => b.className = '');

      let score = 0;
      if (pwd.length >= 6)  score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;

      const cls   = score <= 1 ? 'weak' : score <= 2 ? 'fair' : 'strong';
      const names = score <= 1 ? 'Weak' : score <= 2 ? 'Fair' : score === 3 ? 'Good' : 'Strong';
      const clrs  = { weak: 'var(--danger)', fair: 'var(--tertiary-container)', strong: 'var(--primary)' };
      for (let i = 0; i < score; i++) bars[i].className = cls;
      label.textContent = pwd.length ? names : '';
      label.style.color = clrs[cls];
    }

    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.className = 'auth-alert ' + type;
      document.getElementById('alertMsg').textContent = msg;
      document.getElementById('alertIcon').textContent = type === 'error' ? 'error' : 'check_circle';
      box.style.display = 'flex';
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      document.getElementById('spinner').style.display  = loading ? 'block' : 'none';
      document.getElementById('btnArrow').style.display = loading ? 'none'  : 'block';
      document.getElementById('btnText').textContent    = loading ? 'Creating account…' : 'Create Account';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const confirm   = document.getElementById('confirmPassword').value;
      const terms     = document.getElementById('terms').checked;

      if (!firstName || !email || !password || !confirm)
        return showAlert('Please fill in all required fields.');
      if (password.length < 6)
        return showAlert('Password must be at least 6 characters.');
      if (password !== confirm)
        return showAlert('Passwords do not match.');
      if (!terms)
        return showAlert('Please accept the Terms of Service to continue.');

      setLoading(true);
      document.getElementById('alertBox').style.display = 'none';

      try {
        const name = lastName ? `${firstName} ${lastName}` : firstName;
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('petcare_token', data.token);
          localStorage.setItem('petcare_user',  JSON.stringify(data.user));
          showAlert('Account created! Redirecting…', 'success');
          setTimeout(() => window.location.href = '/', 900);
        } else {
          showAlert(data.message || 'Registration failed.');
          setLoading(false);
        }
      } catch {
        showAlert('Cannot reach server. Please make sure it is running.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
